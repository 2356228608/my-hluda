name: Build Magic Frida

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你自己的补丁仓库
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出官方 Frida 源码（16.1.4 稳定版）
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: '16.1.4'
          path: frida
          submodules: recursive # 必须递归拉取子模块

      # 3. 配置 Git 身份，防止打补丁时报错
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. 动态查找并打入去特征补丁
      - name: Apply Anti-Detection Patches
        run: |
          cd frida
          
          # 对 frida-gum 打补丁
          GUM_PATH=$(find . -maxdepth 3 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            cd "$GUM_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Gum patches applied with warnings"
            fi
            cd "$GITHUB_WORKSPACE/frida"
          fi
          
          # 对 frida-core 打补丁
          CORE_PATH=$(find . -maxdepth 3 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Core patches applied with warnings"
            fi
          fi

      # 5. 安装 Linux 编译基础依赖和 Python 环境
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake autopoint pkg-config unzip python3-pip
          pip3 install meson ninja

      # 6. 下载并配置 Android NDK r25c
      - name: Setup Android NDK
        run: |
          echo "正在下载官方 Android NDK r25c..."
          curl -LO https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
          # 设置全局环境变量
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_PATH

      # 7. 【深度调试与多策略编译】
      - name: Diagnostics and Build Frida Server
        run: |
          cd frida
          export ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c
          
          echo "========================================="
          echo "🔍 诊断阶段 1: 查看根目录 Makefile 的真实内容"
          echo "========================================="
          cat Makefile
          
          echo "========================================="
          echo "🔍 诊断阶段 2: 查看 releng 目录下的脚本分布"
          echo "========================================="
          ls -R releng/
          
          echo "========================================="
          echo "🚀 尝试策略 A: 直接调用 releng/meson.py 检查可用目标"
          echo "========================================="
          if [ -f "releng/meson.py" ]; then
             python3 releng/meson.py --help || echo "meson.py help failed"
          fi

          echo "========================================="
          echo "🚀 尝试策略 B: 开始执行交叉编译"
          echo "========================================="
          
          # 策略 B1: 尝试利用 releng/meson.py 直接对 android-arm64 进行配置和编译
          if [ -f "releng/meson.py" ]; then
             echo "检测到 releng/meson.py，尝试使用 meson 直接编译..."
             python3 releng/meson.py compile -C build android-arm64 && exit 0
          fi
          
          # 策略 B2: 尝试新版 Frida 常见的 make 规则名
          echo "尝试 make android-arm64-server ..."
          make android-arm64-server && exit 0 || echo "B2 失败，继续下一次尝试"
          
          # 策略 B3: 如果都失败了，强制输出当前的全部 make 目标，并故意中断让我们看日志
          echo "❌ 策略全部尝试完毕，无法自动识别编译目标。以下是 config.mk 的内容以供分析："
          cat config.mk || true
          exit 1

      # 8. 收集并整理编译出来的可用文件
      - name: Organize Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          SERVER_BIN=$(find frida/build/ -type f -name "frida-server" | head -n 1)
          if [ -f "$SERVER_BIN" ]; then
            cp "$SERVER_BIN" $GITHUB_WORKSPACE/output/hluda-server-android-arm64
            echo "==== 成功找到编译出的二进制文件！ ===="
          else
            echo "❌ 错误：编译结束，但未能在输出路径中找到 frida-server 文件！"
            exit 1
          fi

      # 9. 自动发布产物到 Release
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "v${{ github.run_number }}-magic"
          name: "Magic Frida Build #${{ github.run_number }}"
          files: |
            output/hluda-server-android-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
