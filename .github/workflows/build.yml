name: Build Magic Frida 17.x (NDK r29 Android 15)

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: '想要编译的 Frida 17.x 具体版本'
        required: true
        default: '17.15.5'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你的补丁仓库
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出官方 Frida 17.x 源码
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: ${{ github.event.inputs.frida_version }}
          path: frida
          submodules: recursive

      # 3. 配置 Git 身份
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. 动态打入去特征补丁
      - name: Apply Anti-Detection Patches
        run: |
          cd frida
          GUM_PATH=$(find . -maxdepth 4 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            cd "$GUM_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply --ignore-whitespace "$PATCH_DIR"/*.patch || echo "⚠️ Gum patches applied with warnings"
            fi
            cd "$GITHUB_WORKSPACE/frida"
          fi
          CORE_PATH=$(find . -maxdepth 4 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply --ignore-whitespace "$PATCH_DIR"/*.patch || echo "⚠️ Core patches applied with warnings"
            fi
          fi

      # 5. 安装 Linux 17.x 编译依赖
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake autopoint pkg-config unzip python3-pip python3-setuptools jq git nodejs npm
          pip3 install meson ninja

      # 6. 下载并配置谷歌官方 Android NDK r29
      - name: Setup Android NDK r29
        run: |
          echo "正在下载官方 Android NDK r29 (Android 15 强力支持)..."
          curl -LO https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          
          NDK_DIR=$(find $GITHUB_WORKSPACE -maxdepth 1 -type d -name "android-ndk-r29*" | head -n 1)
          echo "NDK 实际解压目录: $NDK_DIR"
          
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "$NDK_DIR" >> $GITHUB_PATH

      # 7. 【核心史诗级修复】编译与即时收割产物一体化
      - name: Real Build & Immediately Harvest 17.x
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          FRIDA_VER="${{ github.event.inputs.frida_version }}"
          
          cd frida
          export ANDROID_NDK_ROOT=${{ env.ANDROID_NDK_ROOT }}
          
          ARCHS=("android-arm" "android-arm64" "android-x86" "android-x86_64")
          
          for ARCH in "${ARCHS[@]}"; do
            echo "======================================================="
            echo "🔨 开始配置与编译架构: $ARCH"
            echo "======================================================="
            
            # 清理单次构建缓存
            git clean -xdf -e subprojects/ -e my-hluda/ 2>/dev/null || true
            rm -rf build/ deps/
            
            # 引导交叉配置
            if ./configure --host=$ARCH; then
               echo "✅ $ARCH 基础配置成功，开始编译..."
               
               # 触发 17.x 验证成功的全面 make 默认目标
               if make; then
                  echo "🎉 🎉 $ARCH 默认目标编译成功！正在即时捞取产物..."
                  
                  # 暴力在当前 build 成果树中寻找 frida-server 实体（不依赖路径中的架构名过滤）
                  SERVER_BIN=$(find build/ -type f \( -name "frida-server" -o -name "frida-server.exe" \) | head -n 1)
                  
                  if [ -n "$SERVER_BIN" ] && [ -f "$SERVER_BIN" ]; then
                     TARGET_NAME="hluda-server-${FRIDA_VER}-${ARCH}"
                     cp "$SERVER_BIN" "$GITHUB_WORKSPACE/output/${TARGET_NAME}"
                     chmod +x "$GITHUB_WORKSPACE/output/${TARGET_NAME}"
                     echo "🔥 [收割成功] 已成功锁定制胜文件并移至输出区: ${TARGET_NAME}"
                  else
                     echo "⚠️ 警告：虽然编译声称成功，但未能在 build/ 文件夹内寻获 frida-server 二进制实体。"
                     # 扩大全盘搜索作为兜底
                     SERVER_BIN_BACKUP=$(find . -type f \( -name "frida-server" -o -name "frida-server.exe" \) | grep -v "my-hluda" | head -n 1)
                     if [ -n "$SERVER_BIN_BACKUP" ]; then
                        TARGET_NAME="hluda-server-${FRIDA_VER}-${ARCH}"
                        cp "$SERVER_BIN_BACKUP" "$GITHUB_WORKSPACE/output/${TARGET_NAME}"
                        chmod +x "$GITHUB_WORKSPACE/output/${TARGET_NAME}"
                        echo "🔥 [兜底收割成功] 从平级路径打捞成功: ${TARGET_NAME}"
                     fi
                  fi
                  continue
               fi
               
               echo "❌ $ARCH make 阶段失败"
            else
               echo "❌ $ARCH configure 引导阶段失败"
            fi
          done

      # 8. 安全防御确认
      - name: Verify Harvested Assets
        run: |
          echo "===== 📦 检查最终收割到的全部产物清单 ====="
          ls -l $GITHUB_WORKSPACE/output/ || echo "输出区空无一物"

      # 9. 自动发布到 Release
      - name: Create Release and Upload 17.x Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.frida_version }}-${{ github.run_number }}-magic-17"
          name: "Magic Frida 17.x Full Build (${{ github.event.inputs.frida_version }}) #${{ github.run_number }}"
          files: |
            output/hluda-server-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
