name: Build Magic Frida

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你自己的补丁仓库
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出官方 Frida 源码（使用 16.1.4 稳定版）
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: '16.1.4'
          path: frida
          submodules: recursive # 必须递归拉取子模块

      # 3. 配置 Git 身份，防止打补丁时报错
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. 动态查找并打入去特征补丁
      - name: Apply Anti-Detection Patches
        run: |
          cd frida
          
          # 对 frida-gum 打补丁
          GUM_PATH=$(find . -maxdepth 3 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            cd "$GUM_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Gum patches applied with warnings"
            fi
            cd "$GITHUB_WORKSPACE/frida"
          fi
          
          # 对 frida-core 打补丁
          CORE_PATH=$(find . -maxdepth 3 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Core patches applied with warnings"
            fi
          fi

      # 5. 安装 Linux 编译基础依赖和 Python 环境
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake autopoint pkg-config unzip python3-pip python3-setuptools
          pip3 install meson ninja

      # 6. 下载并配置 Android NDK r25c
      - name: Setup Android NDK
        run: |
          echo "正在下载官方 Android NDK r25c..."
          curl -LO https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
          # 设置全局环境变量，让随后的编译工具链能无缝找到 NDK
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_PATH

      # 7. 【终极强力构建】利用多策略链条，必须把 android-arm64 逼出来
      - name: Force Build Frida Server
        run: |
          cd frida
          export ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c
          
          echo "🚀 [策略 1] 尝试 Frida 16.x 核心服务编译命令: make core-android-arm64"
          make core-android-arm64 && exit 0 || echo "策略 1 失败，切入备份策略..."
          
          echo "🚀 [策略 2] 尝试使用 python 转发脚本直接构建架构"
          if [ -f "releng/build.py" ]; then
            python3 releng/build.py android-arm64 && exit 0
          elif [ -f "meson.py" ]; then
            python3 meson.py compile -C build android-arm64 && exit 0
          fi
          
          echo "🚀 [策略 3] 兜底暴力破解: 直接调用 Makefile 构建所有 android 架构"
          make android && exit 0 || echo "暴力破解失败"
          
          echo "❌ 所有策略全军覆没，强制中断检查原因"
          exit 1

      # 8. 收集并整理编译出来的可用文件
      - name: Organize Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          
          # 16.x 交叉编译的产物极大可能深埋在 build/ 文件夹里，我们全盘搜索名为 frida-server 的二进制执行文件
          SERVER_BIN=$(find frida/build/ -type f -name "frida-server" | head -n 1)
          if [ -f "$SERVER_BIN" ]; then
            cp "$SERVER_BIN" $GITHUB_WORKSPACE/output/hluda-server-android-arm64
            echo "==== 🎉🎉🎉 成功找到并提取出编译好的二进制文件！ ===="
          else
            echo "❌ 错误：编译虽结束，但未能在输出路径中找到 frida-server 产物文件！"
            exit 1
          fi

      # 9. 自动发布产物到 Release
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "v${{ github.run_number }}-magic"
          name: "Magic Frida Build #${{ github.run_number }}"
          files: |
            output/hluda-server-android-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
