name: Build Magic Frida (Florida Flow)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Florida Patches
        uses: actions/checkout@v4
        with:
          repository: 'Ylarod/Florida'
          ref: 'main'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential crossbuild-essential-arm64 crossbuild-essential-armhf git jq

      - name: Get Latest Frida Version
        id: frida_ver
        run: |
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Frida Version to Build: $VERSION"

      - name: Clone Frida and Apply Florida Patches
        run: |
          # 1. 克隆官方指定版本的 Frida
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          git checkout ${{ env.VERSION }}
          
          # 2. 配置 Git 机器人信息防止打补丁报错
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 3. 将 Florida 的魔改补丁拷贝并应用到 Frida 源码中
          cp -r ../patches ./
          git am patches/*.patch || { echo "Applying patches failed!"; exit 1; }

      - name: Build Frida Server for Android (ARM64)
        run: |
          cd frida
          make server-android-arm64

      - name: Build Frida Server for Android (ARM)
        run: |
          cd frida
          make server-android-arm

      - name: Package Release Files
        run: |
          mkdir build_assets
          # 压缩 arm64 版本
          xz -z -f -k frida/build/frida-android-arm64/bin/frida-server
          mv frida/build/frida-android-arm64/bin/frida-server.xz build_assets/hluda-server-${{ env.VERSION }}-android-arm64.xz
          
          # 压缩 arm 版本
          xz -z -f -k frida/build/frida-android-arm/bin/frida-server
          mv frida/build/frida-android-arm/bin/frida-server.xz build_assets/hluda-server-${{ env.VERSION }}-android-arm.xz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}-magic
          name: Magic Frida Server (Florida) ${{ env.VERSION }}
          files: |
            build_assets/hluda-server-${{ env.VERSION }}-android-arm64.xz
            build_assets/hluda-server-${{ env.VERSION }}-android-arm.xz
