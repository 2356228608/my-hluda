name: Build Magic Frida

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.10'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm build-essential crossbuild-essential-arm64 crossbuild-essential-armhf git

      - name: Get Latest Frida Version
        id: frida_ver
        run: |
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Frida Latest Version: $VERSION"

      - name: Clone Frida and Apply Ylarod Patches
        run: |
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          git checkout ${{ env.VERSION }}
          # 自动拉取并应用 Ylarod 的去特征补丁
          git clone https://github.com/Ylarod/Florida.git ../Florida
          cp -r ../Florida/patches/* ./
          # 自动应用所有 patch
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git am *.patch || echo "Some patches skipped or applied manually"

      - name: Build Frida Server for Android
        run: |
          cd frida
          # 编译 arm64 和 arm 架构（绝大多数安卓 15 设备所需）
          make server-android-arm64
          make server-android-arm

      - name: Package and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}-magic
          name: Magic Frida Server ${{ env.VERSION }}
          files: |
            frida/build/frida-android-arm64/bin/frida-server
            frida/build/frida-android-arm/bin/frida-server
