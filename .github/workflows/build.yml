name: Build Florida Modern

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Florida Project
        uses: actions/checkout@v4
        with:
          repository: 'Ylarod/Florida'
          ref: 'main'

      - name: Set up Environment and Build Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 安装基础依赖
          sudo apt-get update
          sudo apt-get install -y build-essential crossbuild-essential-arm64 crossbuild-essential-armhf git jq xz-utils python3

          # 2. 调用项目内置的现代自动化构建脚本 (不走老旧的 actions 插件)
          # 获取官方最新 Frida 并自动魔改编译
          python3 ./scripts/build.py --target android-arm64
          python3 ./scripts/build.py --target android-arm
          
          # 3. 创建打包目录
          mkdir ./out
          mv build/frida-android-arm64/bin/frida-server ./out/hluda-server-android-arm64
          mv build/frida-android-arm/bin/frida-server ./out/hluda-server-android-arm
          
          # 4. 使用 GitHub 官方最新的 CLI 工具直接发布 Release，绝不报过期错误
          TAG_NAME="v$(date +'%Y.%m.%d')-magic"
          gh release create "$TAG_NAME" ./out/* --title "Magic Frida Server ($TAG_NAME)" --notes "Automated anti-detection build for Android 15"
