name: Build Magic Frida 17.x (Diagnostics Mode)

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: '想要编译的 Frida 17.x 具体版本'
        required: true
        default: '17.15.5'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你自己的补丁仓库
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出官方 Frida 源码
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: ${{ github.event.inputs.frida_version }}
          path: frida
          submodules: recursive

      # 3. 配置 Git 身份
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. 动态查找并打入去特征补丁
      - name: Apply Anti-Detection Patches
        run: |
          cd frida
          GUM_PATH=$(find . -maxdepth 4 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            cd "$GUM_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply --ignore-whitespace "$PATCH_DIR"/*.patch || echo "⚠️ Gum patches applied with warnings"
            fi
            cd "$GITHUB_WORKSPACE/frida"
          fi
          CORE_PATH=$(find . -maxdepth 4 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply --ignore-whitespace "$PATCH_DIR"/*.patch || echo "⚠️ Core patches applied with warnings"
            fi
          fi

      # 5. 安装 Linux 编译依赖
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake autopoint pkg-config unzip python3-pip python3-setuptools jq git
          pip3 install meson ninja

      # 6. 下载并配置 Android NDK r25c
      - name: Setup Android NDK
        run: |
          echo "正在下载官方 Android NDK r25c..."
          curl -LO https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_PATH

      # 7. 循环构建四大架构 (带实时编译错误追踪)
      - name: Loop Build All Android Archs
        run: |
          cd frida
          export ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c
          
          # 先单独攻坚我们最需要的 android-arm64 作为主力测试
          ARCHS=("android-arm" "android-arm64" "android-x86" "android-x86_64")
          
          for ARCH in "${ARCHS[@]}"; do
            echo "======================================================="
            echo "🚀 正在编译架构: $ARCH"
            echo "======================================================="
            
            # 尝试新版 Python 构建入口，并把错误彻底打印出来
            python3 ./releng/meson_make.py $ARCH core || echo "❌ 策略 1 编译失败"
          done

      # 8. 【核心升级：大扫除式全盘路径诊断】
      - name: Deep Diagnostics and File Mapping
        run: |
          echo "======================================================="
          echo "🔍 诊断开始：全盘检索当前工作目录下生成的所有文件夹"
          echo "======================================================="
          cd $GITHUB_WORKSPACE
          
          echo "--- 1. 打印当前 workspace 下的第一层级目录结构 ---"
          ls -F
          
          echo "--- 2. 打印 frida 源码根目录下的第一层级目录结构 ---"
          ls -F frida/
          
          echo "--- 3. 暴力列出所有名字包含 'android' 的文件夹及其下的所有二进制文件 ---"
          # 这个命令会找出所有生成编译产物的文件夹，并打印出里面所有文件的名字！
          find . -type d -name "*android*" -print -exec ls -R {} \; 2>/dev/null | head -n 300
          
          echo "--- 4. 盲搜所有具有执行权限的编译产物 ---"
          find frida/ -type f -executable -not -name "*.py" -not -name "*.sh" | head -n 50 || echo "未找到任何可执行二进制文件"
          
          echo "======================================================="
          echo "🔍 诊断结束，强制中断以保留上方打印的完整日志"
          echo "======================================================="
          exit 1
