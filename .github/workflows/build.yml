name: Build Magic Frida

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你自己的补丁仓库
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出官方 Frida 源码（此处以 16.1.4 为例，可按需修改）
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: '16.1.4'
          path: frida
          submodules: recursive # 必须递归拉取子模块，Frida 编译极度依赖子模块

      # 3. 配置 Git 身份，防止打补丁时报错
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. 动态查找并打入去特征补丁
      - name: Apply Anti-Detection Patches
        run: |
          cd frida
          
          # 对 frida-gum 打补丁
          GUM_PATH=$(find . -maxdepth 3 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            cd "$GUM_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A$PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Gum patches applied with warnings"
            fi
            cd "$GITHUB_WORKSPACE/frida"
          fi
          
          # 对 frida-core 打补丁
          CORE_PATH=$(find . -maxdepth 3 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A$PATCH_DIR/*.patch 2>/dev/null)" ]; then
              git apply "$PATCH_DIR"/*.patch || echo "Core patches applied with warnings"
            fi
          fi

      # 5. 安装 Linux 编译基础依赖和 Python 环境
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential iconv toolchain-prefix binfmt-support libtool autoconf automake autopoint gettext pkg-config
          pip3 install meson ninja

      # 6. 【核心步骤】安装并配置 Android NDK（Frida 16.x 推荐使用 r25 左右的版本）
      - name: Setup Android NDK
        uses: nndess/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      # 7. 【核心步骤】执行真正的交叉编译（以 Android arm64 为例）
      - name: Build Frida Server
        run: |
          cd frida
          # 执行 Frida 官方的 Android arm64 编译命令
          make android-arm64

      # 8. 收集并整理编译出来的可用文件，移动到独立目录，方便上传
      - name: Organize Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          
          # 在 frida 编译生成目录里寻找编译好的 frida-server
          # 顺便重命名，加上你的定制特征（如：hluda-server-android-arm64）
          SERVER_BIN=$(find frida/build/ -type f -name "frida-server" | head -n 1)
          if [ -f "$SERVER_BIN" ]; then
            cp "$SERVER_BIN" $GITHUB_WORKSPACE/output/hluda-server-android-arm64
            echo "成功找到编译文件！"
          else
            echo "❌ 错误：未能在编译输出中找到 frida-server 文件！"
            exit 1
