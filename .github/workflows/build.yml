name: Build Magic Frida

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 核心修复 1：显式赋予工作流创建 Release 和写入仓库的权限
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 检出你自己的 my-hluda 仓库（包含你的 patches 文件夹和编译脚本）
      - name: Checkout custom patches
        uses: actions/checkout@v4
        with:
          path: my-hluda

      # 2. 检出 Frida 官方的源码（或者是你期望魔改的指定 Frida 版本）
      # 核心修复 2：使用你的 GIT_OWNER 和 GIT_REPO 变量，并带上 Token 鉴权防 128 错误
      - name: Checkout Frida Source
        uses: actions/checkout@v4
        with:
          repository: 'frida/frida'
          ref: '16.1.4' # 这里可以改成你想编译的官方 Frida 版本号
          path: frida
          submodules: true # 如果需要完整编译，通常需要开启子模块

      # 3. 配置 Git 环境（防止应用补丁或提交时因找不到身份而报 exit code 128/1）
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 4. 核心魔改步骤：动态查找 frida-gum 和 frida-core 并打入补丁
      # 无论官方把这两个文件夹放在根目录还是 subprojects 下，都能自动找到
      - name: Apply Anti-Detection Patches
        run: |
          # 确保进入了克隆的 frida 源码目录
          cd frida
          echo "==== 当前 Frida 目录结构简览 ===="
          ls -F
          
          # ---- 1. 寻找并对 frida-gum 打补丁 ----
          GUM_PATH=$(find . -maxdepth 3 -type d -name "frida-gum" | head -n 1)
          if [ -n "$GUM_PATH" ]; then
            echo "找到 frida-gum 路径: $GUM_PATH"
            cd "$GUM_PATH"
            # 这里的补丁路径要根据实际克隆结构寻找，使用绝对路径更安全
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-gum"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              echo "正在应用 frida-gum 补丁..."
              git apply "$PATCH_DIR"/*.patch || echo "部分 gum 补丁被跳过或已应用"
            else
              echo "未在 $PATCH_DIR 发现补丁文件"
            fi
            cd "$GITHUB_WORKSPACE/frida" # 切回 frida 根目录
          else
            echo "❌ 错误：未能在源码中找到 frida-gum 文件夹！"
            exit 1
          fi

          # ---- 2. 寻找并对 frida-core 打补丁 ----
          CORE_PATH=$(find . -maxdepth 3 -type d -name "frida-core" | head -n 1)
          if [ -n "$CORE_PATH" ]; then
            echo "找到 frida-core 路径: $CORE_PATH"
            cd "$CORE_PATH"
            PATCH_DIR="$GITHUB_WORKSPACE/my-hluda/patches/frida-core"
            if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
              echo "正在应用 frida-core 补丁..."
              git apply "$PATCH_DIR"/*.patch || echo "部分 core 补丁被跳过或已应用"
            else
              echo "未在 $PATCH_DIR 发现补丁文件"
            fi
            cd "$GITHUB_WORKSPACE"
          else
            echo "❌ 错误：未能在源码中找到 frida-core 文件夹！"
            exit 1
          fi

      # 5. 设置编译所需的依赖环境（以 Android 编译为例，需要 Python 和 NDK）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 6. 执行编译命令
      - name: Build Frida Server for Android
        run: |
          cd frida
          # 根据 frida 官方编译指南执行，例如编译 android-arm64
          # make android-arm64
          
      # 7. 自动发布产物（如果你需要它生成 Release 供下载）
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "v${{ github.run_number }}-magic-frida"
          name: "Magic Frida Build #${{ github.run_number }}"
          files: |
            frida/build/frida-android-arm64/bin/frida-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
